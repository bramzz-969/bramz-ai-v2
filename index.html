<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bramz AI - Intelligence</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        panel: '#111111',
                        border: '#222222'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: #ffffff; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Main Layout */
        .app-wrapper { height: 100vh; display: flex; overflow: hidden; }
        
        /* Chat Viewport: Memaksa pesan mulai dari atas */
        #chat-viewport { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 20px 180px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Input Bar: Fixed at bottom */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #050505 85%, transparent);
            padding: 20px 16px 40px 16px;
            z-index: 40;
        }

        /* Sidebar Control */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; }
        .sidebar-closed { transform: translateX(-100%); }

        /* Bubble Styles */
        .msg-user { 
            align-self: flex-end; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 12px 18px; 
            border-radius: 20px 20px 4px 20px; 
            max-width: 85%; 
            font-size: 14px; 
            line-height: 1.5;
        }
        
        .msg-ai { 
            align-self: flex-start; 
            display: flex; 
            gap: 12px; 
            max-width: 92%; 
            font-size: 14px; 
            color: #ececec; 
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: fadeInUp 0.3s ease forwards; }

        .dot { width: 4px; height: 4px; background: #888; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Medium screens adjustment */
        @media (min-width: 768px) {
            .input-area { left: 288px; } /* Sesuaikan dengan lebar sidebar */
        }
    </style>
</head>
<body>

    <!-- Backdrop Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/80 hidden z-[150]" onclick="toggleSidebar()"></div>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-closed md:translate-x-0 fixed md:relative w-72 h-full bg-panel border-r border-border flex flex-col">
            <div class="p-6 flex items-center justify-between border-b border-border">
                <h2 class="font-bold flex items-center gap-2"><i class="ph-fill ph-shimmer"></i> Bramz AI</h2>
                <button onclick="toggleSidebar()" class="md:hidden"><i class="ph ph-x text-xl text-gray-400"></i></button>
            </div>
            
            <div class="p-4">
                <button onclick="newChat()" class="w-full bg-white text-black py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition">
                    <i class="ph ph-plus-bold"></i> Obrolan Baru
                </button>
            </div>
            
            <div id="history-list" class="flex-1 overflow-y-auto px-3 no-scrollbar space-y-1">
                <!-- Riwayat Chat -->
            </div>

            <div class="p-5 border-t border-border bg-panel/50">
                <div class="flex flex-col gap-1">
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Powered by Bramz AI</span>
                    <span class="text-[9px] text-gray-600 font-medium">© 2026 Bramz Web Creator & Development</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col relative">
            <!-- Header -->
            <header class="h-16 border-b border-border flex items-center justify-between px-5 bg-dark/60 backdrop-blur-md z-30 shrink-0">
                <div class="flex items-center gap-3">
                    <button id="menu-trigger" onclick="toggleSidebar()" class="md:hidden p-2 text-gray-400"><i class="ph ph-list text-2xl"></i></button>
                    <span class="text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase">Bramzz AI</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Active</span>
                </div>
            </header>

            <!-- Chat Viewport -->
            <div id="chat-viewport" class="no-scrollbar">
                <div id="welcome" class="mt-24 text-center opacity-40">
                    <i class="ph-fill ph-sparkle text-6xl mb-4"></i>
                    <h1 class="text-xl font-bold">Bramzz AI</h1>
                    <p class="text-xs mt-2 text-gray-400">Tanyakan apa saja ke Bramz AI</p>
                </div>
            </div>

            <!-- Sticky Input -->
            <div class="input-area">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-panel border border-border rounded-2xl flex items-end p-2.5 focus-within:border-gray-500 transition-all shadow-2xl">
                        <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none outline-none p-3 text-sm resize-none max-h-40" placeholder="Tulis pesan..." oninput="autoSize(this)"></textarea>
                        <button id="send-btn" onclick="send()" class="bg-white text-black w-10 h-10 rounded-xl flex items-center justify-center m-1 hover:scale-105 active:scale-90 transition disabled:opacity-20">
                            <i class="ph-bold ph-arrow-up"></i>
                        </button>
                    </div>
                    <p class="text-[8px] text-center text-gray-700 mt-4 uppercase tracking-[0.4em] font-bold">Bramzz Web Crrator and Development</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let chatDB = JSON.parse(localStorage.getItem('bramz_ai_v4')) || [];
            let currentChatId = null;

            // Sidebar Toggle
            window.toggleSidebar = (e) => {
                if(e) e.stopPropagation();
                document.getElementById('sidebar').classList.toggle('sidebar-closed');
                document.getElementById('overlay').classList.toggle('hidden');
            };

            window.autoSize = (el) => {
                el.style.height = 'auto';
                el.style.height = (el.scrollHeight) + 'px';
                document.getElementById('send-btn').disabled = el.value.trim() === '';
            };

            function saveDB() {
                localStorage.setItem('bramz_ai_v4', JSON.stringify(chatDB));
                renderHistory();
            }

            function renderHistory() {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                [...chatDB].reverse().forEach(item => {
                    const div = document.createElement('div');
                    const isActive = item.id === currentChatId;
                    div.className = `p-3 rounded-xl cursor-pointer flex items-center justify-between group transition-all ${isActive ? 'bg-white/5 border border-white/10' : 'hover:bg-white/5'}`;
                    div.innerHTML = `
                        <div class="flex items-center gap-3 truncate flex-1" onclick="loadChat('${item.id}')">
                            <i class="ph ph-chat-circle text-lg ${isActive ? 'text-white' : 'text-gray-600'}"></i>
                            <span class="truncate text-sm ${isActive ? 'text-white font-semibold' : 'text-gray-500'}">${item.title}</span>
                        </div>
                        <i class="ph ph-trash text-gray-700 hover:text-red-500 opacity-0 group-hover:opacity-100 p-1" onclick="deleteChat('${item.id}')"></i>
                    `;
                    list.appendChild(div);
                });
            }

            window.loadChat = (id) => {
                currentChatId = id;
                const session = chatDB.find(s => s.id === id);
                const viewport = document.getElementById('chat-viewport');
                viewport.innerHTML = '';
                
                if (session.messages.length === 0) {
                    viewport.innerHTML = document.getElementById('welcome').outerHTML;
                } else {
                    session.messages.forEach(m => {
                        const div = document.createElement('div');
                        div.className = m.role === 'user' ? 'msg-user animate-msg' : 'msg-ai animate-msg';
                        
                        if (m.role === 'user') {
                            div.innerText = m.text;
                        } else {
                            div.innerHTML = `
                                <div class="w-8 h-8 rounded-lg bg-white flex-shrink-0 flex items-center justify-center text-black shadow-lg">
                                    <i class="ph-fill ph-sparkle text-sm"></i>
                                </div>
                                <div class="pt-1.5 leading-relaxed text-gray-200">
                                    ${m.text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}
                                </div>
                            `;
                        }
                        viewport.appendChild(div);
                    });
                }
                viewport.scrollTop = viewport.scrollHeight;
                renderHistory();
                
                // Tutup sidebar otomatis di mobile setelah pilih chat
                if (window.innerWidth < 768) {
                    const sb = document.getElementById('sidebar');
                    if (!sb.classList.contains('sidebar-closed')) toggleSidebar();
                }
            };

            window.newChat = () => {
                currentChatId = null;
                document.getElementById('chat-viewport').innerHTML = document.getElementById('welcome').outerHTML;
                renderHistory();
                if (window.innerWidth < 768) {
                    const sb = document.getElementById('sidebar');
                    if (!sb.classList.contains('sidebar-closed')) toggleSidebar();
                }
            };

            window.deleteChat = (id) => {
                chatDB = chatDB.filter(s => s.id !== id);
                if (currentChatId === id) newChat();
                saveDB();
            };

            window.send = async () => {
                const input = document.getElementById('user-input');
                const text = input.value.trim();
                if (!text) return;

                if (!currentChatId) {
                    currentChatId = 'id_' + Date.now();
                    chatDB.push({ id: currentChatId, title: text.substring(0, 25), messages: [] });
                }

                const currentSession = chatDB.find(s => s.id === currentChatId);
                currentSession.messages.push({ role: 'user', text: text });
                
                input.value = '';
                input.style.height = 'auto';
                loadChat(currentChatId);

                // Loading State
                const viewport = document.getElementById('chat-viewport');
                const loader = document.createElement('div');
                loader.className = 'msg-ai animate-msg';
                loader.id = 'temp-loader';
                loader.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center text-black"><i class="ph-fill ph-sparkle text-sm"></i></div>
                    <div class="pt-3 flex gap-1"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                `;
                viewport.appendChild(loader);
                viewport.scrollTop = viewport.scrollHeight;

                try {
                    const response = await fetch(`https://api.danzy.web.id/api/ai/gemini-lite?q=${encodeURIComponent(text)}`);
                    const data = await response.json();
                    let aiReply = "";
                    
                    if (data.result?.parts?.[0]?.text) aiReply = data.result.parts[0].text;
                    else if (data.data?.result?.parts?.[0]?.text) aiReply = data.data.result.parts[0].text;
                    else aiReply = "Maaf, sistem sedang tidak merespon.";

                    currentSession.messages.push({ role: 'ai', text: aiReply });
                } catch (err) {
                    currentSession.messages.push({ role: 'ai', text: "Gagal terhubung ke server." });
                } finally {
                    const l = document.getElementById('temp-loader');
                    if (l) l.remove();
                    saveDB();
                    loadChat(currentChatId);
                }
            };

            // Keyboard Listeners
            document.getElementById('user-input').addEventListener('keydown', (e) => {
                // Pastikan Enter tidak memicu event sidebar
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    window.send();
                }
            });

            window.onload = () => {
                renderHistory();
                document.getElementById('send-btn').disabled = true;
            };
        })();
    </script>
</body>
</html>
